server:
  port: 8082

spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    username: app_user
    password: app_pass
    driver-class-name: oracle.jdbc.OracleDriver

app:
  pull:
    singleUrl: http://localhost:8081/pull/single
    bulkUrl: http://localhost:8081/pull/bulk

  push:
    batchSize: 50