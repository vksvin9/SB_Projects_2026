<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Auth Out</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

  <!-- Navbar -->
  <div class="d-flex justify-content-between mb-3">
    <h4>Auth Out</h4>
    <div>
      <a href="/auth-in" class="btn btn-outline-primary btn-sm">Auth In</a>
      <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
  </div>

  <div class="card p-4 shadow">

    <form action="/do-auth-out" method="post">

      <div class="mb-2">
        <label>UUID</label>
        <input name="uuid" class="form-control">
      </div>

      <div class="mb-3">
        <label>Output JSON</label>
        <textarea name="output" class="form-control">{"status":"SUCCESS"}</textarea>
      </div>

      <button class="btn btn-primary">Auth Out</button>
    </form>

    <div class="text-success mt-2" th:text="${msg}"></div>
    <div class="text-danger mt-2" th:text="${error}"></div>

  </div>
</div>

</body>
</html>
