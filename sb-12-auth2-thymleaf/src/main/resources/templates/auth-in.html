<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Auth In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

  <!-- Navbar -->
  <div class="d-flex justify-content-between mb-3">
    <h4>Auth In</h4>
    <div>
      <a href="/auth-out" class="btn btn-outline-primary btn-sm">Auth Out</a>
      <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
  </div>

  <div class="card p-4 shadow">

    <form action="/do-auth-in" method="post">

      <div class="mb-2">
        <label>Token</label>
        <input name="token" th:value="${session.token}" class="form-control">
      </div>

      <div class="mb-2">
        <label>UUID</label>
        <input name="uuid" id="uuid" class="form-control">
      </div>

      <div class="mb-2">
        <label>API</label>
        <input name="api" value="Service1_api1" class="form-control">
      </div>

      <div class="mb-2">
        <label>IP</label>
        <input name="ip" value="127.0.0.1" class="form-control">
      </div>

      <div class="mb-3">
        <label>Input JSON</label>
        <textarea name="input" class="form-control">{"amount":1000}</textarea>
      </div>

      <button class="btn btn-success">Auth In</button>
    </form>

    <div class="text-success mt-2" th:text="${msg}"></div>
    <div class="text-danger mt-2" th:text="${error}"></div>

  </div>
</div>

<script>
  document.getElementById("uuid").value = crypto.randomUUID();
</script>

</body>
</html>
