<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Blog Dashboard</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {

            background-color: #f8fafc;
        }

        .navbar-custom {

            background:
                linear-gradient(135deg,
                    #0f172a,
                    #1e293b);
        }

        .post-card {

            border: none;

            border-radius: 20px;

            transition: 0.3s;

            background: white;
        }

        .post-card:hover {

            transform: translateY(-4px);

            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .post-title {

            font-weight: 700;

            color: #0f172a;
        }

        .post-content {

            color: #475569;

            line-height: 1.7;
        }

        .tag-badge {

            background: #e2e8f0;

            color: #0f172a;

            font-size: 13px;

            border-radius: 30px;

            padding: 6px 12px;
        }

        .feed-title {

            font-weight: 800;

            color: #0f172a;
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">

        <div class="container">

            <a class="navbar-brand fw-bold fs-3" href="/dashboard">

                BlogVerse

            </a>

            <div class="d-flex gap-2">

                <a href="/create" class="btn btn-warning fw-semibold">

                    + Create Post

                </a>

                <form th:action="@{/logout}" method="post">

                    <button class="btn btn-outline-light">

                        Logout

                    </button>

                </form>

            </div>

        </div>

    </nav>

    <!-- MAIN CONTENT -->

    <div class="container py-5">

        <!-- Header -->

        <div class="d-flex
                flex-column
                flex-lg-row
                justify-content-between
                align-items-lg-center
                mb-5">

            <div>

                <h1 class="feed-title mb-2">

                    Community Feed

                </h1>

                <p class="text-secondary">

                    Explore posts from the community

                </p>

            </div>

            <!-- Search -->

            <form action="/dashboard" method="get" class="d-flex gap-2 mt-3 mt-lg-0">

                <input type="text" name="keyword" class="form-control form-control-lg" placeholder="Search posts...">

                <button class="btn btn-dark px-4">

                    Search

                </button>

            </form>

        </div>

        <!-- POSTS -->

        <div class="row g-4">

            <div class="col-lg-8 mx-auto" th:each="post : ${posts}">

                <div class="card post-card shadow-sm p-4">

                    <!-- Title -->

                    <h2 class="post-title mb-3" th:text="${post.title}">

                    </h2>

                    <!-- Author -->

                    <div class="mb-3 text-secondary small">

                        Posted by
                        <span class="fw-semibold" th:text="${post.user != null ? post.user.name : 'Anonymous'}">
                        </span>

                    </div>

                    <!-- Content -->

                    <p class="post-content" th:text="${#strings.abbreviate(post.content, 250)}">

                    </p>

                    <!-- Tags -->

                    <div class="d-flex gap-2 flex-wrap mb-4">

                        <span class="tag-badge" th:each="tag : ${post.tags}" th:text="${'#' + tag.name}">

                        </span>

                    </div>

                    <!-- Buttons -->

                    <div class="d-flex gap-2 flex-wrap">

                        <a th:href="@{/post/{id}(id=${post.id})}" class="btn btn-dark rounded-pill px-4">

                            Read More

                        </a>

                        <a th:href="@{/edit/{id}(id=${post.id})}" class="btn btn-outline-warning rounded-pill px-4">

                            Edit

                        </a>

                        <a th:href="@{/delete/{id}(id=${post.id})}" class="btn btn-outline-danger rounded-pill px-4">

                            Delete

                        </a>

                    </div>

                </div>

            </div>

        </div>

        <!-- Empty State -->

        <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5">

            <h3 class="text-secondary">

                No posts found

            </h3>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
