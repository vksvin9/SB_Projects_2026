<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>BlogVerse</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">

            BlogVerse

        </a>

        <div class="d-flex gap-2">

            <a href="/login"
               class="btn btn-outline-light">

                Login

            </a>

            <a href="/register"
               class="btn btn-warning">

                Register

            </a>

        </div>

    </div>

</nav>

<!-- Hero -->

<section class="container py-5">

    <div class="row align-items-center">

        <div class="col-lg-6">

            <h1 class="display-4 fw-bold mb-4">

                Share Ideas With The World

            </h1>

            <p class="lead text-secondary mb-4">

                A modern community blogging platform
                built with Spring Boot MVC.

            </p>

            <div class="d-flex gap-3">

                <a href="/register"
                   class="btn btn-dark btn-lg">

                    Get Started

                </a>

                <a href="/login"
                   class="btn btn-outline-dark btn-lg">

                    Login

                </a>

            </div>

        </div>

        <div class="col-lg-6 text-center mt-5 mt-lg-0">

            <img
                    src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=1200&auto=format&fit=crop"
                    class="img-fluid rounded-4 shadow">

        </div>

    </div>

</section>

</body>
</html>
