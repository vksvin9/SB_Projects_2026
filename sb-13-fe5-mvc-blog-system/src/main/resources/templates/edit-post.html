<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Post</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Edit Post</h2>

<form th:action="@{/update}"
      th:object="${post}"
      method="post">

    <input type="hidden"
           th:field="*{id}">

    <div class="mb-3">

        <label>Title</label>

        <input type="text"
               th:field="*{title}"
               class="form-control">

    </div>

    <div class="mb-3">

        <label>Content</label>

        <textarea th:field="*{content}"
                  class="form-control"
                  rows="6"></textarea>

    </div>

    <button class="btn btn-primary">
        Update Post
    </button>

</form>

</body>
</html>
