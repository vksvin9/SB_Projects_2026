<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create Post</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow rounded-4 p-4">

                <h2 class="fw-bold mb-4">
                    Create Blog Post
                </h2>

                <form th:action="@{/save}"
                      th:object="${post}"
                      method="post">

                    <!-- Title -->
                    <div class="mb-3">

                        <label class="form-label">
                            Title
                        </label>

                        <input type="text"
                               th:field="*{title}"
                               class="form-control form-control-lg">

                        <small class="text-danger"
                               th:errors="*{title}">
                        </small>

                    </div>

                    <!-- Content -->
                    <div class="mb-3">

                        <label class="form-label">
                            Content
                        </label>

                        <textarea th:field="*{content}"
                                  rows="10"
                                  class="form-control"></textarea>

                        <small class="text-danger"
                               th:errors="*{content}">
                        </small>

                    </div>

                    <!-- Tags -->
                    <div class="mb-4">

                        <label class="form-label">
                            Tags
                        </label>

                        <input type="text"
                               name="tags"
                               class="form-control"
                               placeholder="java, springboot, backend">

                    </div>

                    <button class="btn btn-dark btn-lg">
                        Publish Post
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
