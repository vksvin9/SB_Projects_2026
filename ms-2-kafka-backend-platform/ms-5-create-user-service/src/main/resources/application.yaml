spring:
  application:
    name: ${APP_NAME:ms-5-create-user-service}

  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:app_pass}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring:
          json:
            add:
              type:
                headers: false

  cloud:
    compatibility-verifier:
      enabled: false

server:
  port: ${APP_PORT:8082}

# =========================================================
# EUREKA CONFIGURATION
# =========================================================
eureka:

  instance:
    hostname: localhost
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka}

# =========================================================
# ACTUATOR CONFIGURATION
# =========================================================
management:

  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:

    health:
      show-details: always

  info:
    env:
      enabled: true

  tracing:
    sampling:
      probability: 1.0

# =========================================================
# APPLICATION INFO
# =========================================================
info:
  app:
    name: ${APP_NAME:ms-5-create-user-service}
    version: ${APP_VERSION:1.0.0}
    description: ${APP_DESCRIPTION:Create User Kafka Producer Service}

# =========================================================
# LOGGING CONFIGURATION
# =========================================================
logging:

  level:
    root: INFO

    com.vin: DEBUG

    org.springframework.kafka: INFO
    org.apache.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# =========================================================
# CUSTOM KAFKA TOPICS
# =========================================================
kafka:
  topic:
    user-created: ${KAFKA_TOPIC_USER_CREATED:user-created}