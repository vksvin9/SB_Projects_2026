spring:
  application:
    name: ${APP_NAME:ms-1-service-template}
  cloud:
    compatibility-verifier:
      enabled: false

server:
  port: ${APP_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  tracing:
    sampling:
      probability: 1.0

info:
  app:
    name: ${APP_NAME:ms-1-service-template}
    version: ${APP_VERSION:1.0.0}
    description: ${APP_DESCRIPTION:Reusable Spring Boot Service Template}

logging:
  level:
    root: INFO
    com.vin: DEBUG