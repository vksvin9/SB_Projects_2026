<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: header"></head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header
                    bg-primary
                    text-white">

            <h3 th:text="${pageTitle}">
            </h3>

        </div>

        <div class="card-body">

            <form th:action=
                  "${questionId != null} ?
                  @{/admin/questions/update/{id}
                  (id=${questionId})}
                  :
                  @{/admin/questions/save}"

                  th:object="${questionRequest}"

                  method="post">

                <div class="mb-3">

                    <label>
                        Question
                    </label>

                    <textarea
                            th:field=
                            "*{questionText}"

                            class="form-control">
                    </textarea>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>
                            Option A
                        </label>

                        <input type="text"
                               th:field=
                               "*{optionA}"

                               class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>
                            Option B
                        </label>

                        <input type="text"
                               th:field=
                               "*{optionB}"

                               class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>
                            Option C
                        </label>

                        <input type="text"
                               th:field=
                               "*{optionC}"

                               class="form-control">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>
                            Option D
                        </label>

                        <input type="text"
                               th:field=
                               "*{optionD}"

                               class="form-control">

                    </div>

                </div>

                <div class="mb-3">

                    <label>
                        Correct Answer
                    </label>

                    <select
                            th:field=
                            "*{correctAnswer}"

                            class="form-select">

                        <option value="">
                            Select
                        </option>

                        <option value="A">
                            A
                        </option>

                        <option value="B">
                            B
                        </option>

                        <option value="C">
                            C
                        </option>

                        <option value="D">
                            D
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>
                        Marks
                    </label>

                    <input type="number"
                           th:field="*{marks}"

                           class="form-control">

                </div>

                <div class="mb-3">

                    <label>
                        Exam
                    </label>

                    <select
                            th:field="*{examId}"

                            class="form-select">

                        <option th:each=
                                "exam : ${exams}"

                                th:value=
                                "${exam.id}"

                                th:text=
                                "${exam.title}">
                        </option>

                    </select>

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Save

                </button>

                <a th:href=
                   "@{/admin/questions/{id}
                   (id=${questionRequest.examId})}"

                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
