<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: header"></head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header
                            bg-primary
                            text-white">

                    <h3 th:text="${pageTitle}">
                    </h3>

                </div>

                <div class="card-body">

                    <form th:action=
                          "${examId != null} ?
                          @{/admin/exams/update/{id}
                          (id=${examId})}
                          :
                          @{/admin/exams/save}"

                          th:object="${examRequest}"

                          method="post">

                        <div class="mb-3">

                            <label class="form-label">
                                Title
                            </label>

                            <input type="text"
                                   th:field="*{title}"
                                   class="form-control">

                            <div class="text-danger"
                                 th:if=
                                 "${#fields.hasErrors('title')}"

                                 th:errors="*{title}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                    th:field=
                                    "*{description}"

                                    class="form-control">
                            </textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Duration Minutes
                            </label>

                            <input type="number"
                                   th:field=
                                   "*{durationMinutes}"

                                   class="form-control">

                            <div class="text-danger"
                                 th:if=
                         "${#fields.hasErrors(
                         'durationMinutes')}"

                                 th:errors=
                                 "*{durationMinutes}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Total Marks
                            </label>

                            <input type="number"
                                   th:field=
                                   "*{totalMarks}"

                                   class="form-control">

                            <div class="text-danger"
                                 th:if=
                        "${#fields.hasErrors(
                        'totalMarks')}"

                                 th:errors=
                                 "*{totalMarks}">
                            </div>

                        </div>

                        <button type="submit"
                                class="btn btn-primary">

                            Save

                        </button>

                        <a th:href="@{/admin/exams}"
                           class="btn btn-secondary">

                            Back

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
