<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec=
      "http://www.thymeleaf.org/extras/spring-security">

<body>

<nav th:fragment="navbar"
     class="navbar navbar-expand-lg
            navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           th:href="@{/}">

            Exam Portal

        </a>

        <ul class="navbar-nav ms-auto">

            <li class="nav-item"
                sec:authorize=
                "hasRole('ADMIN')">

                <a class="nav-link"
                   th:href=
                   "@{/admin/exams}">

                    Exams

                </a>

            </li>

            <li class="nav-item"
                sec:authorize=
                "hasRole('STUDENT')">

                <a class="nav-link"
                   th:href=
                   "@{/student/exams}">

                    Exams

                </a>

            </li>

            <li class="nav-item"
                sec:authorize=
                "hasRole('STUDENT')">

                <a class="nav-link"
                   th:href=
                   "@{/student/history}">

                    History

                </a>

            </li>

            <li class="nav-item">

                <a class="nav-link"
                   th:href=
                   "@{/leaderboard}">

                    Leaderboard

                </a>

            </li>

            <li class="nav-item">

                <form th:action=
                      "@{/logout}"

                      method="post">

                    <button type="submit"
                            class=
                            "btn btn-link nav-link">

                        Logout

                    </button>

                </form>

            </li>

        </ul>

    </div>

</nav>

</body>
</html>
