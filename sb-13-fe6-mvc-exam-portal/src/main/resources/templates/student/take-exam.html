<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}">
</div>

<div class="container mt-5 mb-5">

    <div class="card shadow">

        <div class="card-header
                    bg-primary
                    text-white
                    d-flex
                    justify-content-between
                    align-items-center">

            <h3 class="mb-0">
                Exam Started
            </h3>

            <div class="text-end">

                <div>
                    Remaining Time
                </div>

                <h4 id="timer"
                    class="fw-bold mb-0">

                    00:00

                </h4>

            </div>

        </div>

        <div class="card-body">

            <form th:action=
                  "@{/student/exams/submit}"

                  method="post">

                <input type="hidden"
                       name="examId"
                       th:value="${examId}">

                <div th:if=
                     "${#lists.isEmpty(questions)}"

                     class="alert alert-danger">

                    No Questions Available

                </div>

                <div th:each=
                     "question, stat : ${questions}"

                     class="card mb-4 shadow-sm">

                    <div class="card-body">

                        <h5 class="mb-4">

                            Q<span th:text=
                                    "${stat.count}">
                            </span>.

                            <span th:text=
                                  "${question.questionText}">
                            </span>

                        </h5>

                        <!-- OPTION A -->

                        <div class="form-check mb-2">

                            <input class="form-check-input"
                                   type="radio"

                                   th:id=
                                   "${'q' + question.id + 'A'}"

                                   th:name=
                                   "${'answers[' +
                                   question.id + ']'}"

                                   value="A">

                            <label class=
                                   "form-check-label"

                                   th:for=
                                   "${'q' + question.id + 'A'}">

                                <strong>A.</strong>

                                <span th:text=
                                      "${question.optionA}">
                                </span>

                            </label>

                        </div>

                        <!-- OPTION B -->

                        <div class="form-check mb-2">

                            <input class="form-check-input"
                                   type="radio"

                                   th:id=
                                   "${'q' + question.id + 'B'}"

                                   th:name=
                                   "${'answers[' +
                                   question.id + ']'}"

                                   value="B">

                            <label class=
                                   "form-check-label"

                                   th:for=
                                   "${'q' + question.id + 'B'}">

                                <strong>B.</strong>

                                <span th:text=
                                      "${question.optionB}">
                                </span>

                            </label>

                        </div>

                        <!-- OPTION C -->

                        <div class="form-check mb-2">

                            <input class="form-check-input"
                                   type="radio"

                                   th:id=
                                   "${'q' + question.id + 'C'}"

                                   th:name=
                                   "${'answers[' +
                                   question.id + ']'}"

                                   value="C">

                            <label class=
                                   "form-check-label"

                                   th:for=
                                   "${'q' + question.id + 'C'}">

                                <strong>C.</strong>

                                <span th:text=
                                      "${question.optionC}">
                                </span>

                            </label>

                        </div>

                        <!-- OPTION D -->

                        <div class="form-check mb-2">

                            <input class="form-check-input"
                                   type="radio"

                                   th:id=
                                   "${'q' + question.id + 'D'}"

                                   th:name=
                                   "${'answers[' +
                                   question.id + ']'}"

                                   value="D">

                            <label class=
                                   "form-check-label"

                                   th:for=
                                   "${'q' + question.id + 'D'}">

                                <strong>D.</strong>

                                <span th:text=
                                      "${question.optionD}">
                                </span>

                            </label>

                        </div>

                    </div>

                </div>

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-success
                                   btn-lg px-5">

                        Submit Exam

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script th:inline="javascript">

    let durationMinutes =
        /*[[${durationMinutes}]]*/ 60;

    let time =
        durationMinutes * 60;

    const timerElement =
        document.getElementById("timer");

    let timer = setInterval(function () {

        let minutes =
            Math.floor(time / 60);

        let seconds =
            time % 60;

        timerElement.innerHTML =

            minutes + ":" +
            (seconds < 10
                ? "0"
                : "") + seconds;

        time--;

        if (time < 0) {

            clearInterval(timer);

            alert("Time Up");

            document.forms[0].submit();
        }

    }, 1000);

</script>

</body>
</html>
