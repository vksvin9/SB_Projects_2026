spring:

  application:
    name: examportal

  datasource:
    url: jdbc:h2:mem:examdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    defer-datasource-initialization: true

    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.vin: DEBUG