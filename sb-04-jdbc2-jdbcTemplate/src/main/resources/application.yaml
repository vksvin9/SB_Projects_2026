spring:
    application:
        name: sb-04-jdbc2-jdbcTemplate
    datasource:
        url: jdbc:h2:mem:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password: sa

    h2:
        console:
            enabled: true
            path: /h2-console

    sql:
        init:
            mode: always

server:
    port: 8080
