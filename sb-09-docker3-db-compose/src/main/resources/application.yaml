# =========================
# SERVER
# =========================
server:
  port: 8080

# =========================
# DATASOURCE (ORACLE)
# =========================
spring:
  datasource:
    url: jdbc:oracle:thin:@//${DB_HOST:oracle-db}:${DB_PORT:1521}/${DB_SERVICE:FREEPDB1}
    username: ${DB_USER:app_user}
    password: ${DB_PASSWORD:app_pass}
    driver-class-name: oracle.jdbc.OracleDriver

    # -------------------------
    # HIKARI (RETRY SAFE)
    # -------------------------
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
      maximum-pool-size: 5
      minimum-idle: 1

  # =========================
  # JPA
  # =========================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect

# =========================
# LOGGING
# =========================
logging:
  level:
    root: INFO
    com.vin: DEBUG