<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot AI Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            height: 100vh;
        }

        .chat-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .chat-card {
            width: 100%;
            max-width: 1000px;
            height: 92vh;
            border: 0;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        .chat-header {
            background: linear-gradient(135deg, #0d6efd, #6f42c1);
            color: #fff;
            padding: 1rem 1.5rem;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .chat-body {
            height: calc(92vh - 82px - 112px);
            overflow-y: auto;
            padding: 1.5rem;
            background: #f8fafc;
        }

        .message-row {
            display: flex;
            margin-bottom: 1rem;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 0.9rem 1.1rem;
            border-radius: 18px;
            white-space: pre-wrap;
            line-height: 1.6;
            word-break: break-word;
        }

        .message-row.user .message-bubble {
            background: #0d6efd;
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message-row.assistant .message-bubble {
            background: #ffffff;
            color: #212529;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .chat-footer {
            background: #fff;
            border-top: 1px solid #e9ecef;
            padding: 1rem;
        }

        .input-shell {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 18px;
            padding: 0.75rem;
        }

        .input-shell textarea {
            border: 0 !important;
            box-shadow: none !important;
            resize: none;
            background: transparent;
            min-height: 64px;
        }

        .typing::after {
            content: '▋';
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .action-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .chat-wrapper {
                padding: 0;
            }

            .chat-card {
                height: 100vh;
                border-radius: 0;
            }

            .chat-body {
                height: calc(100vh - 82px - 112px);
                padding: 1rem;
            }

            .message-bubble {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="chat-wrapper">
    <div class="card chat-card">

        <!-- Header -->
        <div class="chat-header d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <div class="avatar">
                    <i class="bi bi-robot"></i>
                </div>
                <div>
                    <h5 class="mb-0">Spring Boot AI Assistant</h5>
                    <small class="opacity-75">Powered by Ollama</small>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-light btn-sm"
                        onclick="copyConversation()"
                        title="Copy Conversation">
                    <i class="bi bi-clipboard"></i>
                </button>

                <button class="btn btn-light btn-sm"
                        onclick="clearChat()"
                        title="Clear Chat">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div id="chatBody" class="chat-body">

            <div th:if="${#lists.isEmpty(chatHistory)}"
                 class="text-center text-muted mt-5">
                <i class="bi bi-chat-dots fs-1"></i>
                <p class="mt-3 mb-1">
                    Ask anything about Java, Spring Boot, Microservices, or DevOps.
                </p>
                <small>Responses stream in real time.</small>
            </div>

            <div th:each="msg : ${chatHistory}"
                 th:classappend="${msg.role == 'user'} ? 'message-row user' : 'message-row assistant'"
                 class="message-row">
                <div class="message-bubble"
                     th:text="${msg.content}"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="chat-footer">
            <div class="input-shell">
                <textarea id="message"
                          class="form-control"
                          placeholder="Type your message..."></textarea>

                <div class="d-flex justify-content-between align-items-center mt-2">
                    <small class="text-muted">
                        Enter to send, Shift + Enter for new line
                    </small>

                    <!-- Send / Stop Button -->
                    <button id="sendBtn"
                            class="btn btn-primary action-btn"
                            onclick="handleSendOrStop()"
                            title="Send Message">
                        <i id="sendBtnIcon"
                           class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const messageInput = document.getElementById('message');
    const chatBody = document.getElementById('chatBody');
    const sendBtn = document.getElementById('sendBtn');
    const sendBtnIcon = document.getElementById('sendBtnIcon');

    let isStreaming = false;
    let currentReader = null;

    function handleSendOrStop() {
        if (isStreaming) {
            stopStreaming();
        } else {
            sendMessage();
        }
    }

    async function sendMessage() {
        const message = messageInput.value.trim();

        if (!message) {
            return;
        }

        const emptyState = chatBody.querySelector('.text-center.text-muted');
        if (emptyState) {
            emptyState.remove();
        }

        appendMessage('user', message);

        const assistantDiv = appendMessage('assistant', '');
        assistantDiv.classList.add('typing');

        messageInput.value = '';
        messageInput.focus();

        isStreaming = true;
        sendBtn.classList.remove('btn-primary');
        sendBtn.classList.add('btn-dark');
        sendBtn.title = 'Stop Response';
        sendBtnIcon.className = 'bi bi-stop-fill';

        scrollToBottom();

        try {
            const response = await fetch(
                '/api/chat/stream?message=' + encodeURIComponent(message)
            );

            if (!response.ok || !response.body) {
                throw new Error('Streaming failed');
            }

            currentReader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const {done, value} = await currentReader.read();

                if (done) {
                    break;
                }

                const chunk = decoder.decode(value, {stream: true});
                assistantDiv.textContent += chunk;
                scrollToBottom();
            }

        } catch (error) {
            if (error.name !== 'AbortError') {
                assistantDiv.textContent =
                        'Unable to connect to the server.';
            }
        } finally {
            assistantDiv.classList.remove('typing');
            resetSendButton();
            currentReader = null;
            scrollToBottom();
        }
    }

    async function stopStreaming() {
        if (currentReader) {
            await currentReader.cancel();
        }

        resetSendButton();
    }

    function resetSendButton() {
        isStreaming = false;
        sendBtn.classList.remove('btn-dark');
        sendBtn.classList.add('btn-primary');
        sendBtn.title = 'Send Message';
        sendBtnIcon.className = 'bi bi-send-fill';
    }

    function appendMessage(role, text) {
        const row = document.createElement('div');
        row.className = `message-row ${role}`;

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = text;

        row.appendChild(bubble);
        chatBody.appendChild(row);

        return bubble;
    }

    async function clearChat() {
        await fetch('/api/chat/clear', {
            method: 'POST'
        });

        location.reload();
    }

    function copyConversation() {
        navigator.clipboard.writeText(chatBody.innerText)
            .then(() => alert('Conversation copied to clipboard.'));
    }

    function scrollToBottom() {
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    messageInput.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            handleSendOrStop();
        }
    });

    window.addEventListener('load', function () {
        scrollToBottom();
        messageInput.focus();
    });
</script>
</body>
</html>
