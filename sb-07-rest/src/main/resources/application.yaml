spring:
  application:
    name: template
server:
  port: 8080

api:
  base-url: https://jsonplaceholder.typicode.com
  
  resilience4j:

    retry:
      instances:
        apiRetry:
          max-attempts: 3
          wait-duration: 2s

    circuitbreaker:
      instances:
        apiCB:
          sliding-window-size: 10
          failure-rate-threshold: 50
          wait-duration-in-open-state: 10s

    timelimiter:
      instances:
        apiTimeout:
          timeout-duration: 3s