<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg border-0 rounded-4">

                    <div class="card-body p-5">

                        <h2 class="mb-4 text-primary">
                            Add Expense
                        </h2>

                        <form th:action="@{/expenses}" th:object="${expense}" method="post">

                            <div class="mb-3">

                                <label>Name</label>

                                <input type="text" th:field="*{name}" class="form-control">

                            </div>

                            <div class="mb-3">

                                <label>Amount</label>

                                <input type="number" step="0.01" th:field="*{amount}" class="form-control">

                                <div class="text-danger" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}">
                                </div>

                            </div>

                            <div class="mb-3">

                                <label>Category</label>

                                <input type="text" th:field="*{category}" class="form-control">

                            </div>

                            <div class="mb-3">

                                <label>Date</label>

                                <input type="date" th:field="*{date}" class="form-control">

                            </div>

                            <button class="btn btn-primary w-100">
                                Save Expense
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
