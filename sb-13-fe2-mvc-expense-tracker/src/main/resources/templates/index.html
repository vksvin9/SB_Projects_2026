<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h1 class="text-primary">
                        Expense Tracker
                    </h1>

                    <a href="/add-expense" class="btn btn-primary">
                        Add Expense
                    </a>

                </div>

                <div class="alert alert-success">

                    <h4>
                        Total Expense:
                        ₹ <span th:text="${total}"></span>
                    </h4>

                </div>

                <form method="get" action="/" class="mb-4">

                    <div class="input-group">

                        <input type="text" name="category" class="form-control" placeholder="Filter by category">

                        <button class="btn btn-dark">
                            Filter
                        </button>

                    </div>

                </form>

                <table class="table table-hover">

                    <thead class="table-dark">

                        <tr>

                            <th>Name</th>

                            <th>Amount</th>

                            <th>Category</th>

                            <th>Date</th>

                            <th>Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="expense : ${expenses}">

                            <td th:text="${expense.name}"></td>

                            <td>
                                ₹ <span th:text="${expense.amount}"></span>
                            </td>

                            <td th:text="${expense.category}"></td>

                            <td th:text="${expense.date}"></td>

                            <td>

                                <form th:action="@{/expenses/delete/{id}(id=${expense.id})}" method="post">

                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>

                                </form>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>

</html>
