spring:
    application:
        name: sb-04-jdbc3-hibernate-orm

    datasource:
        url: jdbc:h2:mem:testdb
        driver-class-name: org.h2.Driver
        username: sa
        password: sa

    h2:
        console:
            enabled: true
            path: /h2-console

    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
           s ddl-auto: update
        show-sql: true

server:
    port: 8080
