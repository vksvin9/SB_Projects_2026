<!-- HTML5 Document Declaration -->
<!DOCTYPE html>
<!-- Root HTML Tag with Thymeleaf Namespace -->
<html xmlns:th="http://www.thymeleaf.org">
<!-- Head Section Starts -->
<head>
<!-- Browser Tab Title -->
<title>Add Task</title>
<!-- Bootstrap CSS CDN Link -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Head Section Ends -->
</head>
<!-- Main Body Container with Bootstrap Margin -->
<body class="container mt-5">
	<!-- Page Heading -->
	<h1>Add Task</h1>
	<!-- Form to Submit Task Data -->
	<form th:action="@{/tasks}" th:object="${task}" method="post">
		<!-- Title Input Section -->
		<div class="mb-3">
			<!-- Label for Title Input -->
			<label class="form-label">Title</label>
			<!-- Input Field Bound with Task Title -->
			<input type="text"
				th:field="*{title}" class="form-control">
			<!-- Validation Error Message for Title -->
			<div class="text-danger" th:if="${#fields.hasErrors('title')}"
				th:errors="*{title}"></div>
		</div>
		<!-- Description Input Section -->
		<div class="mb-3">
			<!-- Label for Description -->
			<label>Description</label>
			<!-- Textarea Bound with Task Description -->
			<textarea th:field="*{description}" class="form-control">
        </textarea>
		</div>
		<!-- Submit Button -->
		<button type="submit" class="btn btn-primary">Save</button>
	<!-- Form Ends -->
	</form>
<!-- Body Ends -->
</body>
<!-- HTML Document Ends -->
</html>
