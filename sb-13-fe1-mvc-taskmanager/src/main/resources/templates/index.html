<!-- HTML5 Document Declaration -->
<!DOCTYPE html>
<!-- Root HTML Tag with Thymeleaf Namespace -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<!-- Browser Tab Title -->
	<title>Task Dashboard</title>
	<!-- Bootstrap CSS CDN -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<!-- Main Body Container with Margin Top -->
<body class="container mt-5">
	<!-- Dashboard Heading -->
	<h1 class="mb-4">Task Dashboard</h1>
	<!-- Navigation Button to Add Task Page -->
	<a href="/add-task" class="btn btn-primary mb-3">
		Add Task
	</a>
	<!-- Bootstrap Styled Table -->
	<table class="table table-bordered">
		<!-- Table Header Section -->
		<thead>
			<!-- Table Header Row -->
			<tr>
				<!-- Task Title Column -->
				<th>Title</th>
				<!-- Task Description Column -->
				<th>Description</th>
				<!-- Task Status Column -->
				<th>Status</th>
				<!-- Task Creation Time Column -->
				<th>Created</th>
				<!-- Task Action Buttons Column -->
				<th>Actions</th>
			</tr>
		</thead>
		<!-- Table Body Section -->
		<tbody>
			<!-- Iterate Over Each Task from Backend -->
			<tr th:each="task : ${tasks}">
				<!-- Display Task Title -->
				<td th:text="${task.title}"></td>
				<!-- Display Task Description -->
				<td th:text="${task.description}"></td>
				<!-- Task Status Section -->
				<td>
					<!-- Show Pending Badge if Status is PENDING -->
					<span class="badge bg-warning" th:if="${task.status == 'PENDING'}">
						Pending
					</span>
					<!-- Show Completed Badge if Status is COMPLETED -->
					<span class="badge bg-success" th:if="${task.status == 'COMPLETED'}">
						Completed
					</span>
				</td>
				<!-- Display Task Creation Timestamp -->
				<td th:text="${task.createdAt}"></td>
				<!-- Action Buttons Section -->
				<td>
					<!-- Form to Mark Task as Complete -->
					<form th:action="@{/tasks/complete/{id}(id=${task.id})}" method="post"
						style="display:inline">
						<!-- Complete Button -->
						<button class="btn btn-success btn-sm">
							Complete
						</button>
					</form>
					<!-- Form to Delete Task -->
					<form th:action="@{/tasks/delete/{id}(id=${task.id})}" method="post"
						style="display:inline">
						<!-- Delete Button -->
						<button class="btn btn-danger btn-sm">
							Delete
						</button>
					</form>
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
