<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Manage Stock</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="container mt-5">

<h2 class="mb-4">
    Manage Product Stock
</h2>

<div class="card p-4">

    <!-- Success Message -->
    <div th:if="${successMessage}"
         class="alert alert-success">

        <span th:text="${successMessage}"></span>

    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}"
         class="alert alert-danger">

        <span th:text="${errorMessage}"></span>

    </div>

    <!-- Product Name -->
    <h4 th:text="${product.name}">
        Product Name
    </h4>

    <!-- Current Quantity -->
    <p class="mt-3">

        Current Quantity :

        <strong th:text="${product.quantity}">
            0
        </strong>

    </p>

    <!-- Stock Form -->
    <form th:action="@{/stock/update}"
          method="post">

        <!-- Product ID -->
        <input type="hidden"
               name="productId"
               th:value="${product.id}">

        <!-- Action -->
        <div class="mb-3">

            <label class="form-label">
                Select Action
            </label>

            <select name="action"
                    class="form-select">

                <option value="ADD">
                    Add Stock
                </option>

                <option value="REMOVE">
                    Remove Stock
                </option>

            </select>

        </div>

        <!-- Quantity -->
        <div class="mb-3">

            <label class="form-label">
                Quantity
            </label>

            <input type="number"
                   name="quantity"
                   min="1"
                   class="form-control"
                   placeholder="Enter Quantity"
                   required>

        </div>

        <!-- Buttons -->
        <div class="d-flex gap-2">

            <button type="submit"
                    class="btn btn-primary">

                Update Stock

            </button>

            <a th:href="@{/}"
               class="btn btn-secondary">

                Back

            </a>

        </div>

    </form>

</div>

</body>
</html>
