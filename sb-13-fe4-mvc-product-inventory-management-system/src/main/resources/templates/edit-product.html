<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Product</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4">Edit Product</h2>

<form th:action="@{/update}"
      th:object="${product}"
      method="post">

    <!-- Hidden ID -->
    <input type="hidden" th:field="*{id}">

    <!-- Product Name -->
    <div class="mb-3">

        <label class="form-label">
            Product Name
        </label>

        <input type="text"
               th:field="*{name}"
               class="form-control"
               placeholder="Enter product name">

        <small class="text-danger"
               th:errors="*{name}">
        </small>

    </div>

    <!-- Price -->
    <div class="mb-3">

        <label class="form-label">
            Price
        </label>

        <input type="number"
               step="0.01"
               th:field="*{price}"
               class="form-control"
               placeholder="Enter price">

        <small class="text-danger"
               th:errors="*{price}">
        </small>

    </div>

    <!-- Quantity -->
    <div class="mb-3">

        <label class="form-label">
            Quantity
        </label>

        <input type="number"
               th:field="*{quantity}"
               class="form-control"
               placeholder="Enter quantity">

        <small class="text-danger"
               th:errors="*{quantity}">
        </small>

    </div>

    <!-- Buttons -->
    <div class="d-flex gap-2">

        <button type="submit"
                class="btn btn-primary">
            Update Product
        </button>

        <a href="/"
           class="btn btn-secondary">
            Cancel
        </a>

    </div>

</form>

</body>
</html>
