
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>

    <link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Add Product</h2>

<form th:action="@{/save}"
      th:object="${product}"
      method="post">

    <div class="mb-3">
        <label>Name</label>

        <input type="text"
               th:field="*{name}"
               class="form-control">

        <small class="text-danger"
               th:errors="*{name}"></small>
    </div>

    <div class="mb-3">
        <label>Price</label>

        <input type="number"
               step="0.01"
               th:field="*{price}"
               class="form-control">

        <small class="text-danger"
               th:errors="*{price}"></small>
    </div>

    <div class="mb-3">
        <label>Quantity</label>

        <input type="number"
               th:field="*{quantity}"
               class="form-control">

        <small class="text-danger"
               th:errors="*{quantity}"></small>
    </div>

    <button class="btn btn-primary">
        Save
    </button>

</form>

</body>
</html>
